name: Ecosystem Health Check (Windows)

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  health-check:
    runs-on: windows-latest

    steps:
      - name: ✅ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Optional: Show environment info (helps debugging)
      - name: 🧾 Environment info
        shell: pwsh
        run: |
          Write-Host "PowerShell version:"
          $PSVersionTable
          Write-Host "Working directory:"
          Get-Location

      # ✅ Run PowerShell debug loop (preferred)
      - name: 🔁 Run debug loop (PowerShell)
        shell: pwsh
        run: |
          pwsh scripts/Run-DebugLoop.ps1 -Iterations 3 -Json

      # OR: Run the CMD wrapper instead
      # - name: 🔁 Run debug loop (CMD)
      #   shell: cmd
      #   run: |
      #     call scripts\debug-run.cmd -Json

      # ✅ Upload logs even if failure occurs
      - name: 📦 Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ecosystem-health-logs
          path: scripts/logs/

      # ✅ Optional: Print summary to job output
      - name: 📊 Print summary
        if: always()
        shell: pwsh
        run: |
          $logs = Get-ChildItem scripts/logs -Filter *.log -ErrorAction SilentlyContinue
          if ($logs.Count -eq 0) {
            Write-Host "No log files found"
          } else {
            Write-Host "Collected $($logs.Count) log files"
          }
