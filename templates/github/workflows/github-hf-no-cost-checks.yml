name: github-hf-no-cost-checks

"on":
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

# Minimal permissions — read-only. Never grant write unless required.
permissions:
  contents: read

jobs:
  safe-health-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-hf-cli-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-hf-cli-

      - name: Install Hugging Face CLI
        run: python -m pip install --upgrade "huggingface_hub[cli]"

      # Version checks are informational — CLI version drift should not block the job
      - name: Verify GitHub CLI version
        id: gh_version
        continue-on-error: true
        run: gh --version

      - name: Verify Hugging Face CLI version
        id: hf_version
        continue-on-error: true
        run: hf version

      # Auth checks — these DO fail the job if broken
      - name: GitHub auth check
        id: gh_auth
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh auth status
          LOGIN=$(gh api user --jq '.login')
          echo "GitHub login: $LOGIN"
          echo "login=$LOGIN" >> "$GITHUB_OUTPUT"

      - name: Hugging Face auth check
        id: hf_auth
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "${HF_TOKEN}" ]; then
            echo "::error::HF_TOKEN secret is missing. Add it under repo Settings → Secrets → Actions."
            exit 1
          fi
          hf auth whoami

      # No-cost metadata read — safe discovery only, no writes/uploads
      - name: No-cost HF metadata check
        id: hf_metadata
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "=== Models (search: mcp, limit: 3) ==="
          hf models list --search "mcp" --limit 3

          echo ""
          echo "=== Datasets (search: instruction, limit: 3) ==="
          hf datasets list --search "instruction" --limit 3

      # Summary reflects actual step outcomes via job context
      - name: Write job summary
        if: always()
        env:
          GH_VERSION_RESULT: ${{ steps.gh_version.outcome }}
          HF_VERSION_RESULT: ${{ steps.hf_version.outcome }}
          GH_AUTH_RESULT: ${{ steps.gh_auth.outcome }}
          HF_AUTH_RESULT: ${{ steps.hf_auth.outcome }}
          HF_METADATA_RESULT: ${{ steps.hf_metadata.outcome }}
          GH_LOGIN: ${{ steps.gh_auth.outputs.login }}
        run: |
          icon() { [ "$1" = "success" ] && echo "✅" || echo "❌"; }

          echo "## Ecosystem Health Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|:---:|" >> "$GITHUB_STEP_SUMMARY"
          echo "| GitHub CLI version | $(icon $GH_VERSION_RESULT) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| HF CLI version | $(icon $HF_VERSION_RESULT) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GitHub auth (login: \`$GH_LOGIN\`) | $(icon $GH_AUTH_RESULT) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Hugging Face auth | $(icon $HF_AUTH_RESULT) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| HF metadata read | $(icon $HF_METADATA_RESULT) |" >> "$GITHUB_STEP_SUMMARY"
