name: Ecosystem Health (Debug Loop)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  health: actions/checkout@v4  health:

      - name: Run debug loop
        shell: pwsh
        run: |
          pwsh scripts/Run-DebugLoop.ps1 -Iterations 3 -Json

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ecosystem-health-logs
          path: scripts/logs/
    runs-on: windows-latest
    steps:
