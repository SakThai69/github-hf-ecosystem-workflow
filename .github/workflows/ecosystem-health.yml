name: Ecosystem Health Check (Windows)

"on":
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Minimal permissions — read-only. Never grant write unless required.
permissions:
  contents: read

jobs:
  health-check:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Environment info
        shell: pwsh
        run: |
          Write-Host "PowerShell version:"
          $PSVersionTable
          Write-Host "Working directory:"
          Get-Location

      # Run debug loop directly — `shell: pwsh` already invokes pwsh, no double-call needed.
      - name: Run debug loop (PowerShell)
        shell: pwsh
        run: ./scripts/Run-DebugLoop.ps1 -Iterations 3 -Json

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ecosystem-health-logs
          path: scripts/logs/
          if-no-files-found: warn

      - name: Print summary
        if: always()
        shell: pwsh
        run: |
          $logs = Get-ChildItem scripts/logs -Filter *.log -ErrorAction SilentlyContinue
          if ($logs.Count -eq 0) {
            Write-Host "No log files found"
          } else {
            Write-Host "Collected $($logs.Count) log files"
          }
