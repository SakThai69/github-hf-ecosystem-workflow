name: Ecosystem health (debug loop)

on:
  workflow_dispatch:
  push:

jobs:
  health:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run debug loop (JSON output)
        shell: cmd
        run: |
          call scripts\debug-run.cmd -Json

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ecosystem-health-logs
          path: scripts\logs\
