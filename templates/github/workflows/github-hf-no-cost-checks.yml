name: github-hf-no-cost-checks

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  safe-health-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
      uses: actions/checkout@v4

      - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

      - name: Install Hugging Face CLI
      run: python -m pip install --upgrade "huggingface_hub[cli]"

      - name: Verify GitHub CLI is available
      run: gh --version

      - name: Verify Hugging Face CLI
      run: hf version

      - name: GitHub auth check
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh auth status
        gh api user --jq '.login'

      - name: Hugging Face auth check
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        if [ -z "${HF_TOKEN}" ]; then
          echo "HF_TOKEN is missing. Add repository secret HF_TOKEN."
          exit 1
        fi
        hf auth whoami

      - name: No-cost HF metadata check
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        hf models list --search "mcp" --limit 3
